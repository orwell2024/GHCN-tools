<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NL weather data interactive tool</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: #fffaf3;
      --ink: #1c1c1c;
      --muted: #6e665d;
      --grid: #ddd2bf;
      --temp: #111111;
      --ghg: #2c8c4a;
      --total: #c8332d;
      --ssr: #c88419;
      --border: #d8ccb8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fff8ef 0, #fff8ef 20%, transparent 55%),
        linear-gradient(180deg, #efe5d6 0, var(--bg) 45%, #efe7db 100%);
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }
    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 17px;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }
    .panel {
      background: color-mix(in srgb, var(--panel) 90%, white 10%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(70, 50, 20, 0.08);
    }
    .controls {
      padding: 18px;
    }
    .group {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid #eadfce;
    }
    .group:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0;
    }
    label, .group-title {
      display: block;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    select, input[type="range"] {
      width: 100%;
    }
    select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fffdf9;
      font: inherit;
    }
    .range-row {
      margin-bottom: 12px;
    }
    .range-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }
    .range-head span {
      color: var(--muted);
      font-size: 14px;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .swatch {
      width: 18px;
      height: 3px;
      border-radius: 999px;
      display: inline-block;
    }
    .chart-wrap {
      padding: 18px;
    }
    .chart-card {
      padding: 14px;
      background: rgba(255, 252, 246, 0.88);
      border: 1px solid #e5d9c6;
      border-radius: 18px;
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-bottom: 12px;
    }
    .station-title {
      font-size: 28px;
      margin: 0;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .page {
        padding: 14px;
      }
      .chart-wrap, .controls {
        padding: 14px;
      }
      .station-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>NL weather data interactive tool</h1>
    <p class="sub">Adjust the temperature axis and the forcing axis separately, and hide the red total line if needed.</p>
    <div class="layout">
      <aside class="panel controls">
        <div class="group">
          <label for="station">Station</label>
          <select id="station"></select>
        </div>
        <div class="group">
          <div class="group-title">Temperature axis (C)</div>
          <div class="range-row">
            <div class="range-head"><span>Min</span><span id="temp-min-value"></span></div>
            <input id="temp-min" type="range" min="-4" max="1" step="0.1" value="-1">
          </div>
          <div class="range-row">
            <div class="range-head"><span>Max</span><span id="temp-max-value"></span></div>
            <input id="temp-max" type="range" min="0.5" max="5" step="0.1" value="2.3">
          </div>
        </div>
        <div class="group">
          <div class="group-title">Forcing axis (W/m2)</div>
          <div class="range-row">
            <div class="range-head"><span>Min</span><span id="force-min-value"></span></div>
            <input id="force-min" type="range" min="-10" max="0" step="0.1" value="-1">
          </div>
          <div class="range-row">
            <div class="range-head"><span>Max</span><span id="force-max-value"></span></div>
            <input id="force-max" type="range" min="0.5" max="40" step="0.1" value="3">
          </div>
        </div>
        <div class="group">
          <label class="toggle"><input id="show-total" type="checkbox" checked> Show total / SSR</label>
          <div class="legend">
            <span class="legend-item"><span class="swatch" style="background: var(--temp)"></span>T</span>
            <span class="legend-item"><span class="swatch" style="background: var(--ghg)"></span>GHG</span>
            <span class="legend-item" id="ssr-legend"><span class="swatch" style="background: var(--ssr)"></span>SSR</span>
            <span class="legend-item" id="total-legend"><span class="swatch" style="background: var(--total)"></span>Total</span>
          </div>
        </div>
      </aside>
      <main class="panel chart-wrap">
        <div class="chart-card">
          <div class="title-row">
            <div>
              <h2 class="station-title" id="station-title"></h2>
              <div class="meta" id="station-meta"></div>
            </div>
          </div>
          <svg id="chart" viewBox="0 0 980 560" aria-label="interactive chart"></svg>
        </div>
      </main>
    </div>
  </div>

    const stationSelect = document.getElementById("station");
    const tempMinInput = document.getElementById("temp-min");
    const tempMaxInput = document.getElementById("temp-max");
    const forceMinInput = document.getElementById("force-min");
    const forceMaxInput = document.getElementById("force-max");
    const showTotalInput = document.getElementById("show-total");
    const tempMinValue = document.getElementById("temp-min-value");
    const tempMaxValue = document.getElementById("temp-max-value");
    const forceMinValue = document.getElementById("force-min-value");
    const forceMaxValue = document.getElementById("force-max-value");
    const stationTitle = document.getElementById("station-title");
    const stationMeta = document.getElementById("station-meta");
    const chart = document.getElementById("chart");
    const ssrLegend = document.getElementById("ssr-legend");
    const totalLegend = document.getElementById("total-legend");

    const stationIds = Object.keys(stationData);
    for (const stationId of stationIds) {
      const option = document.createElement("option");
      option.value = stationId;
      option.textContent = `${stationData[stationId].name} (${stationId})`;
      stationSelect.appendChild(option);
    }
    stationSelect.value = stationIds.includes("260") ? "260" : stationIds[0];

    function formatValue(value, digits = 1) {
      return Number(value).toFixed(digits);
    }

    function makeTicks(min, max, targetCount) {
      const span = max - min;
      if (span <= 0) {
        return [min];
      }
      const rawStep = span / targetCount;
      const power = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const options = [1, 2, 5, 10];
      let step = options[options.length - 1] * power;
      for (const option of options) {
        const candidate = option * power;
        if (candidate >= rawStep) {
          step = candidate;
          break;
        }
      }
      const start = Math.ceil(min / step) * step;
      const ticks = [];
      for (let value = start; value <= max + step * 0.5; value += step) {
        ticks.push(Number(value.toFixed(10)));
      }
      if (!ticks.length) {
        ticks.push(min, max);
      }
      return ticks;
    }

    function clampRanges() {
      if (Number(tempMinInput.value) >= Number(tempMaxInput.value)) {
        tempMaxInput.value = (Number(tempMinInput.value) + 0.1).toFixed(1);
      }
      if (Number(forceMinInput.value) >= Number(forceMaxInput.value)) {
        forceMaxInput.value = (Number(forceMinInput.value) + 0.1).toFixed(1);
      }
    }

    function smoothSeries(rows, key, frac = 0.30) {
      if (rows.length < 3) {
        return rows.map((row) => ({ year: row.year, value: row[key] }));
      }
      const xs = rows.map((row) => row.year);
      const ys = rows.map((row) => row[key]);
      const span = Math.max(3, Math.ceil(xs.length * frac));
      const smoothed = [];
      for (let index = 0; index < xs.length; index += 1) {
        const x0 = xs[index];
        const distances = xs.map((x) => Math.abs(x - x0)).sort((a, b) => a - b);
        const bandwidth = distances[Math.min(span - 1, distances.length - 1)];
        if (bandwidth === 0) {
          smoothed.push({ year: x0, value: ys[index] });
          continue;
        }
        let sw = 0;
        let sx = 0;
        let sy = 0;
        let sxx = 0;
        let sxy = 0;
        for (let inner = 0; inner < xs.length; inner += 1) {
          const u = Math.abs(xs[inner] - x0) / bandwidth;
          const weight = u >= 1 ? 0 : Math.pow(1 - Math.pow(u, 3), 3);
          sw += weight;
          sx += xs[inner] * weight;
          sy += ys[inner] * weight;
          sxx += xs[inner] * xs[inner] * weight;
          sxy += xs[inner] * ys[inner] * weight;
        }
        const denom = sw * sxx - sx * sx;
        const value = sw === 0 || denom === 0 ? ys[index] : ((sw * sxy - sx * sy) / denom) * x0 + ((sy - ((sw * sxy - sx * sy) / denom) * sx) / sw);
        smoothed.push({ year: x0, value });
      }
      return smoothed;
    }

    function render() {
      clampRanges();
      tempMinValue.textContent = formatValue(tempMinInput.value);
      tempMaxValue.textContent = formatValue(tempMaxInput.value);
      forceMinValue.textContent = formatValue(forceMinInput.value);
      forceMaxValue.textContent = formatValue(forceMaxInput.value);

      const stationId = stationSelect.value;
      const station = stationData[stationId];
      const rows = station.rows;
      const tempMin = Number(tempMinInput.value);
      const tempMax = Number(tempMaxInput.value);
      const forceMin = Number(forceMinInput.value);
      const forceMax = Number(forceMaxInput.value);
      const showTotal = showTotalInput.checked;
      ssrLegend.style.display = showTotal ? "inline-flex" : "none";
      totalLegend.style.display = showTotal ? "inline-flex" : "none";
      const years = rows.map((row) => row.year);
      const yearMin = years[0];
      const yearMax = years[years.length - 1];
      const tempSmooth = smoothSeries(rows, "temp", 0.28);
      const ghgSmooth = smoothSeries(rows, "ghg", 0.35);
      const ssrSmooth = smoothSeries(rows, "ssr", 0.30);
      const totalSmooth = smoothSeries(rows, "total", 0.30);

      stationTitle.textContent = station.name;
      stationMeta.textContent = `${yearMin}-${yearMax}`;

      const width = 980;
      const height = 560;
      const left = 84;
      const right = 86;
      const top = 36;
      const bottom = 54;
      const plotWidth = width - left - right;
      const plotHeight = height - top - bottom;

      function xScale(year) {
        return left + ((year - yearMin) / (yearMax - yearMin)) * plotWidth;
      }

      function yTemp(value) {
        return top + (1 - (value - tempMin) / (tempMax - tempMin)) * plotHeight;
      }

      function yForce(value) {
        return top + (1 - (value - forceMin) / (forceMax - forceMin)) * plotHeight;
      }

      function linePath(items, key, yScale) {
        return items.map((row, index) => `${index === 0 ? "M" : "L"} ${xScale(row.year).toFixed(2)} ${yScale(row[key]).toFixed(2)}`).join(" ");
      }

      function smoothPath(items, yScale) {
        return items.map((row, index) => `${index === 0 ? "M" : "L"} ${xScale(row.year).toFixed(2)} ${yScale(row.value).toFixed(2)}`).join(" ");
      }

      function fillPath(items, yScale, baselineY) {
        if (!items.length) {
          return "";
        }
        const startX = xScale(items[0].year).toFixed(2);
        const endX = xScale(items[items.length - 1].year).toFixed(2);
        return [
          `M ${startX} ${baselineY.toFixed(2)}`,
          items.map((row) => `L ${xScale(row.year).toFixed(2)} ${yScale(row.value).toFixed(2)}`).join(" "),
          `L ${endX} ${baselineY.toFixed(2)}`,
          "Z",
        ].join(" ");
      }

      const tempTicks = makeTicks(tempMin, tempMax, 5);
      const forceTicks = makeTicks(forceMin, forceMax, 5);

      let svg = "";
      svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#fffdf8"></rect>`;
      for (const tick of tempTicks) {
        const y = yTemp(tick);
        svg += `<line x1="${left}" y1="${y.toFixed(2)}" x2="${width - right}" y2="${y.toFixed(2)}" stroke="#ddd2bf" stroke-width="1"></line>`;
        svg += `<text x="${left - 12}" y="${(y + 5).toFixed(2)}" text-anchor="end" font-size="13" fill="#5d554c">${formatValue(tick)}</text>`;
      }
      for (const tick of forceTicks) {
        const y = yForce(tick);
        svg += `<text x="${width - right + 12}" y="${(y + 5).toFixed(2)}" font-size="13" fill="#5d554c">${formatValue(tick)}</text>`;
      }
      const yearTicks = [yearMin, 1990, 2000, 2010, 2020, yearMax].filter((value, index, array) => array.indexOf(value) === index && value >= yearMin && value <= yearMax);
      for (const year of yearTicks) {
        const x = xScale(year);
        svg += `<line x1="${x.toFixed(2)}" y1="${top}" x2="${x.toFixed(2)}" y2="${height - bottom}" stroke="#efe6d8" stroke-width="1"></line>`;
        svg += `<text x="${x.toFixed(2)}" y="${height - 18}" text-anchor="middle" font-size="13" fill="#5d554c">${year}</text>`;
      }
      const zeroTempInRange = tempMin <= 0 && tempMax >= 0;
      if (zeroTempInRange) {
        const y = yTemp(0);
        svg += `<line x1="${left}" y1="${y.toFixed(2)}" x2="${width - right}" y2="${y.toFixed(2)}" stroke="#8f877d" stroke-width="1.2" stroke-dasharray="5 5"></line>`;
      }
      svg += `<line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" stroke="#aa9f8f" stroke-width="1.2"></line>`;
      svg += `<line x1="${width - right}" y1="${top}" x2="${width - right}" y2="${height - bottom}" stroke="#aa9f8f" stroke-width="1.2"></line>`;
      svg += `<line x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" stroke="#aa9f8f" stroke-width="1.2"></line>`;
      svg += `<g id="temp-series">`;
      svg += `<path d="${linePath(rows, "temp", yTemp)}" fill="none" stroke="#777777" stroke-opacity="0.45" stroke-width="1.5"></path>`;
      svg += `<path d="${smoothPath(tempSmooth, yTemp)}" fill="none" stroke="#111111" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"></path>`;
      svg += `</g>`;
      svg += `<g id="ghg-series">`;
      svg += `<path d="${fillPath(ghgSmooth, yForce, yForce(0))}" fill="#2c8c4a" fill-opacity="0.14"></path>`;
      svg += `<path d="${linePath(rows, "ghg", yForce)}" fill="none" stroke="#2c8c4a" stroke-opacity="0.35" stroke-width="1.6"></path>`;
      svg += `<path d="${smoothPath(ghgSmooth, yForce)}" fill="none" stroke="#2c8c4a" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"></path>`;
      svg += `</g>`;
      svg += `<g id="ssr-series">`;
      svg += `<path d="${linePath(rows, "ssr", yForce)}" fill="none" stroke="#c88419" stroke-opacity="0.45" stroke-width="1.8" stroke-dasharray="6 5"></path>`;
      svg += `<path d="${smoothPath(ssrSmooth, yForce)}" fill="none" stroke="#c88419" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 7"></path>`;
      svg += `</g>`;
      svg += `<g id="total-series">`;
      svg += `<path d="${fillPath(totalSmooth, yForce, yForce(0))}" fill="#c8332d" fill-opacity="0.14"></path>`;
      svg += `<path d="${linePath(rows, "total", yForce)}" fill="none" stroke="#c8332d" stroke-opacity="0.30" stroke-width="1.7"></path>`;
      svg += `<path d="${smoothPath(totalSmooth, yForce)}" fill="none" stroke="#c8332d" stroke-width="5.0" stroke-linecap="round" stroke-linejoin="round"></path>`;
      svg += `</g>`;
      svg += `<text x="${left}" y="18" font-size="13" fill="#5d554c">Left axis: temperature anomaly (C)</text>`;
      svg += `<text x="${width - right}" y="18" text-anchor="end" font-size="13" fill="#5d554c">Right axis: SSR / GHG / total (W/m2)</text>`;
      chart.innerHTML = svg;
      const totalSeries = document.getElementById("total-series");
      const ssrSeries = document.getElementById("ssr-series");
      if (ssrSeries) {
        ssrSeries.style.display = showTotal ? "inline" : "none";
      }
      if (totalSeries) {
        totalSeries.style.display = showTotal ? "inline" : "none";
      }
    }

    stationSelect.addEventListener("change", render);
    tempMinInput.addEventListener("input", render);
    tempMaxInput.addEventListener("input", render);
    forceMinInput.addEventListener("input", render);
    forceMaxInput.addEventListener("input", render);
    showTotalInput.addEventListener("change", render);
    render();
